name: Build NeoOS for Mac
on: [push]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4 # Actualizado a v4

      - name: Configurar Python
        uses: actions/setup-python@v5 # Actualizado a v5
        with:
          python-version: '3.11'

      - name: Instalar librerías
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter Pillow py2app

      - name: Crear Aplicación (.app)
        run: |
          python setup.py py2app

      - name: Comprimir Aplicación
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/NeoOS.app NeoOS-Mac-Alpha.zip

      - name: Subir Resultado
        uses: actions/upload-artifact@v4 # <--- AQUÍ ESTÁ LA CORRECCIÓN CLAVE
        with:
          name: NeoOS-App-Mac
          path: NeoOS-Mac-Alpha.zip
