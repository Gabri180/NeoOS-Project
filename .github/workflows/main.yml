name: Build NeoOS for Mac
on: [push]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter Pillow py2app

      - name: Verificar archivos
        run: |
          ls -R # Esto nos dirá en el log si nube.png está presente

      - name: Crear Aplicación (.app)
        run: |
          python setup.py py2app
        # Si esto falla, el log nos dirá exactamente por qué

      - name: Comprimir Aplicación
        run: |
          cd dist
          zip -r ../NeoOS-Mac-Alpha.zip NeoOS.app

      - name: Subir Resultado
        uses: actions/upload-artifact@v4
        with:
          name: NeoOS-App-Mac
          path: NeoOS-Mac-Alpha.zip
